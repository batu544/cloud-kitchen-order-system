{% extends "base.html" %}

{% block title %}My Orders - Cloud Kitchen{% endblock %}

{% block content %}
<div class="bg-white shadow">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <h1 class="text-3xl font-bold text-gray-900">My Orders</h1>
        <p class="mt-1 text-gray-600">Your order history</p>
    </div>
</div>

<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <!-- Loading -->
    <div id="orders-loading" class="text-center py-16 text-gray-400">
        <svg class="animate-spin h-10 w-10 text-orange-500 mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Loading your orders...
    </div>

    <!-- Empty state -->
    <div id="orders-empty" class="hidden text-center py-20">
        <div class="text-6xl mb-4">🍽️</div>
        <p class="text-xl font-semibold text-gray-700 mb-2">No orders yet</p>
        <p class="text-gray-500 mb-6">Looks like you haven't placed any orders.</p>
        <a href="/menu" class="inline-block px-6 py-3 bg-orange-600 text-white font-semibold rounded-lg hover:bg-orange-700 transition">
            Browse Menu
        </a>
    </div>

    <!-- Orders list -->
    <div id="orders-list" class="hidden space-y-4"></div>

</div>
{% endblock %}

{% block scripts %}
<script>
// Auth guard
const user = api.getCurrentUser();
if (!user) {
    showToast('Please log in to view your orders', 'warning');
    window.location.href = '/login?redirect=/my-orders';
}

const STATUS_COLORS = {
    'pending':      'bg-yellow-100 text-yellow-700',
    'confirmed':    'bg-blue-100 text-blue-700',
    'preparing':    'bg-orange-100 text-orange-700',
    'ready':        'bg-purple-100 text-purple-700',
    'delivered':    'bg-green-100 text-green-700',
    'cancelled':    'bg-red-100 text-red-600',
};

const PAYMENT_COLORS = {
    'paid':           'text-green-600',
    'partially_paid': 'text-yellow-600',
    'pending':        'text-red-500',
    'refunded':       'text-gray-500',
};

async function loadOrders() {
    try {
        const response = await api.request('/orders/my-orders');
        const orders = response.data || [];

        document.getElementById('orders-loading').classList.add('hidden');

        if (orders.length === 0) {
            document.getElementById('orders-empty').classList.remove('hidden');
            return;
        }

        const list = document.getElementById('orders-list');
        list.innerHTML = orders.map(order => {
            const dt = new Date(order.order_date);
            const dateStr = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            const timeStr = dt.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

            const statusLabel = order.current_status_name || 'Placed';
            const statusClass = STATUS_COLORS[statusLabel.toLowerCase()] || 'bg-gray-100 text-gray-600';
            const paymentClass = PAYMENT_COLORS[order.payment_status] || 'text-gray-600';

            return `
            <div class="bg-white rounded-lg shadow-sm border border-gray-100 p-5 hover:shadow-md transition">
                <div class="flex items-start justify-between gap-4 mb-3">
                    <div>
                        <span class="text-sm text-gray-500">Order</span>
                        <span class="ml-1 font-bold text-gray-900">#${order.order_id}</span>
                        ${order.order_ref ? `<span class="ml-2 text-xs text-gray-400">(${order.order_ref})</span>` : ''}
                    </div>
                    <span class="px-2.5 py-1 rounded-full text-xs font-semibold ${statusClass}">${statusLabel}</span>
                </div>

                <div class="flex flex-wrap gap-6 text-sm text-gray-600 mb-4">
                    <div>
                        <span class="text-gray-400">Date</span>
                        <p class="font-medium text-gray-800">${dateStr} <span class="text-gray-400 font-normal">${timeStr}</span></p>
                    </div>
                    <div>
                        <span class="text-gray-400">Total</span>
                        <p class="font-bold text-gray-900 text-base">${formatCurrency(order.total_amount)}</p>
                    </div>
                    <div>
                        <span class="text-gray-400">Payment</span>
                        <p class="font-semibold capitalize ${paymentClass}">${(order.payment_status || 'pending').replace('_', ' ')}</p>
                    </div>
                    ${order.notes ? `<div><span class="text-gray-400">Notes</span><p class="text-gray-700">${escapeHtml(order.notes)}</p></div>` : ''}
                </div>

                <div class="flex justify-end">
                    <a href="/track?id=${order.order_id}"
                       class="px-4 py-2 text-sm font-medium text-orange-600 border border-orange-300 rounded-lg hover:bg-orange-50 transition">
                        Track Order
                    </a>
                </div>
            </div>`;
        }).join('');

        list.classList.remove('hidden');
    } catch (error) {
        document.getElementById('orders-loading').classList.add('hidden');
        handleAPIError(error);
    }
}

document.addEventListener('DOMContentLoaded', loadOrders);
</script>
{% endblock %}
