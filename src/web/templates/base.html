<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cloud Kitchen Order System{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#ea580c',
                        secondary: '#f97316',
                    }
                }
            }
        }
    </script>
    <style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .scrollbar-hide {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <a href="/" class="flex items-center">
                        <span class="text-2xl font-bold text-orange-600">🍽️ Cloud Kitchen</span>
                    </a>
                    <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
                        <a href="/menu" class="inline-flex items-center px-1 pt-1 text-gray-900 hover:text-orange-600">Menu</a>
                        <a href="/track" class="inline-flex items-center px-1 pt-1 text-gray-900 hover:text-orange-600">Track Order</a>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/cart" class="relative inline-flex items-center px-4 py-2 text-gray-900 hover:text-orange-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path>
                        </svg>
                        <span id="cart-badge" class="hidden absolute top-0 right-0 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-white transform translate-x-1/2 -translate-y-1/2 bg-orange-600 rounded-full">0</span>
                    </a>
                    <div id="auth-buttons" class="hidden space-x-2">
                        <a href="/login" class="px-4 py-2 text-sm font-medium text-gray-700 hover:text-orange-600">Login</a>
                        <a href="/register" class="px-4 py-2 text-sm font-medium text-white bg-orange-600 rounded-md hover:bg-orange-700">Sign Up</a>
                    </div>
                    <div id="user-menu" class="hidden relative">
                        <button id="user-menu-button" class="flex items-center space-x-2 text-gray-700 hover:text-orange-600">
                            <span id="user-name"></span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>
                        <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 z-50 border border-gray-200">
                            <a id="nav-dashboard" href="/staff/dashboard" class="hidden block px-4 py-2 text-sm text-gray-700 hover:bg-orange-50 hover:text-orange-600">Dashboard</a>
                            <a id="nav-reports" href="/staff/reports" class="hidden block px-4 py-2 text-sm text-gray-700 hover:bg-orange-50 hover:text-orange-600">Reports</a>
                            <div class="border-t border-gray-100 my-1"></div>
                            <button id="logout-btn" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-orange-50 hover:text-orange-600">Logout</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="text-center">
                <p>&copy; 2024 Cloud Kitchen Order System. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="/static/js/api.js"></script>
    <script src="/static/js/cart.js"></script>
    <script src="/static/js/utils.js"></script>
    <script>
        // Update UI based on auth status
        document.addEventListener('DOMContentLoaded', () => {
            const user = api.getCurrentUser();
            const authButtons = document.getElementById('auth-buttons');
            const userMenu = document.getElementById('user-menu');
            const userName = document.getElementById('user-name');

            if (user) {
                authButtons.classList.add('hidden');
                userMenu.classList.remove('hidden');
                userName.textContent = user.username;

                // Show staff/admin links
                if (user.role === 'staff' || user.role === 'admin') {
                    document.getElementById('nav-dashboard').classList.remove('hidden');
                }
                if (user.role === 'admin') {
                    document.getElementById('nav-reports').classList.remove('hidden');
                }

                // Toggle dropdown
                const dropdown = document.getElementById('user-dropdown');
                document.getElementById('user-menu-button').addEventListener('click', (e) => {
                    e.stopPropagation();
                    dropdown.classList.toggle('hidden');
                });

                // Close dropdown on outside click
                document.addEventListener('click', () => {
                    dropdown.classList.add('hidden');
                });

                // Logout
                document.getElementById('logout-btn').addEventListener('click', () => {
                    if (confirm('Logout?')) {
                        api.logout();
                    }
                });
            } else {
                authButtons.classList.remove('hidden');
                userMenu.classList.add('hidden');
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
