{% extends "base.html" %}

{% block title %}Login - Cloud Kitchen{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <!-- Logo and Header -->
        <div class="text-center mb-8">
            <div class="text-6xl mb-4">🍽️</div>
            <h2 class="text-3xl font-bold text-gray-900">Welcome Back</h2>
            <p class="mt-2 text-gray-600">Sign in to your account</p>
        </div>

        <!-- Login Form -->
        <div class="bg-white rounded-lg shadow-md p-8">
            <form id="login-form" onsubmit="handleLogin(event)">
                <!-- Username -->
                <div class="mb-4">
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                        Username or Email
                    </label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        required
                        autofocus
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                        placeholder="Enter your username"
                    >
                </div>

                <!-- Password -->
                <div class="mb-6">
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                        Password
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent"
                        placeholder="Enter your password"
                    >
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="flex items-center justify-between mb-6">
                    <label class="flex items-center">
                        <input type="checkbox" id="remember-me" class="rounded border-gray-300 text-orange-600 focus:ring-orange-500">
                        <span class="ml-2 text-sm text-gray-600">Remember me</span>
                    </label>
                    <a href="#" class="text-sm text-orange-600 hover:text-orange-700">
                        Forgot password?
                    </a>
                </div>

                <!-- Error Message -->
                <div id="error-message" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg">
                    <p class="text-sm text-red-600"></p>
                </div>

                <!-- Submit Button -->
                <button
                    type="submit"
                    id="login-btn"
                    class="w-full px-6 py-3 bg-orange-600 text-white font-semibold rounded-lg hover:bg-orange-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    Sign In
                </button>
            </form>

            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-300"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white text-gray-500">Don't have an account?</span>
                </div>
            </div>

            <!-- Register Link -->
            <a href="/register" class="block w-full px-6 py-3 bg-gray-100 text-gray-800 font-semibold rounded-lg hover:bg-gray-200 transition text-center">
                Create Account
            </a>
        </div>

        <!-- Guest Checkout -->
        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">
                Just want to order?
                <a href="/menu" class="text-orange-600 hover:text-orange-700 font-medium">Continue as guest</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Handle login form submission
async function handleLogin(event) {
    event.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const rememberMe = document.getElementById('remember-me').checked;

    const loginBtn = document.getElementById('login-btn');
    const errorMessage = document.getElementById('error-message');

    // Hide previous errors
    errorMessage.classList.add('hidden');

    // Validate inputs
    if (!username || !password) {
        showError('Please enter both username and password');
        return;
    }

    // Disable button and show loading
    loginBtn.disabled = true;
    loginBtn.textContent = 'Signing in...';

    try {
        // Attempt login
        const response = await api.login(username, password);

        // Success - show message
        showToast('Login successful!', 'success');

        // Redirect after short delay
        setTimeout(() => {
            // Check if there's a redirect URL
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect');

            if (redirect) {
                window.location.href = redirect;
            } else {
                // Default redirect based on role
                const user = api.getCurrentUser();
                if (user.role === 'staff' || user.role === 'admin') {
                    window.location.href = '/staff';
                } else {
                    window.location.href = '/menu';
                }
            }
        }, 500);

    } catch (error) {
        // Show error message
        showError(error.message || 'Invalid username or password');

        // Re-enable button
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
    }
}

// Show error message
function showError(message) {
    const errorMessage = document.getElementById('error-message');
    errorMessage.querySelector('p').textContent = message;
    errorMessage.classList.remove('hidden');
}

// Check if already logged in
document.addEventListener('DOMContentLoaded', () => {
    const user = api.getCurrentUser();

    if (user) {
        // Already logged in, redirect
        const urlParams = new URLSearchParams(window.location.search);
        const redirect = urlParams.get('redirect');

        if (redirect) {
            window.location.href = redirect;
        } else if (user.role === 'staff' || user.role === 'admin') {
            window.location.href = '/staff';
        } else {
            window.location.href = '/menu';
        }
    }
});
</script>
{% endblock %}
